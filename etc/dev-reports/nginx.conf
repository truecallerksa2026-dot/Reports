upstream reportbuilder_api {
    server reportbuilder-api:80;
}

upstream reportbuilder_angular {
    server reportbuilder-angular:80;
}

server {
    listen 80;
    server_name dev-reports.local;

    client_max_body_size 50M;

    # API backend: REST, OpenIddict, ABP Account pages (capital A), Swagger, static assets
    # Case-SENSITIVE (~) so Angular's /account/* routes are NOT intercepted here
    location ~ ^/(api|connect|\.well-known|Account|swagger|__bundles|bundles|libs|global-scripts\.js|global-styles\.css|health-status|abp-api-definition|hangfire|Abp|Themes)(/|$) {
        proxy_pass http://reportbuilder_api;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host  $host;
        proxy_read_timeout 300s;
        proxy_buffer_size   128k;
        proxy_buffers       4 256k;
    }

    # Angular SPA - everything else
    location / {
        proxy_pass http://reportbuilder_angular;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
