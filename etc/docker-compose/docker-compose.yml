services:
  reportbuilder-angular:
    image: reportbuilder-angular:latest
    container_name: reportbuilder-angular
    build:
      context: ../../
      dockerfile: angular/Dockerfile.local
    ports:
      - "4200:80"
    depends_on:
      - reportbuilder-api
    volumes:
      - ./dynamic-env.json://usr/share/nginx/html/dynamic-env.json
    networks:
      - abp-network

  reportbuilder-api:
    image: reportbuilder-api:latest
    container_name: reportbuilder-api
    hostname: reportbuilder-api
    build:
      context: ../../
      dockerfile: src/ReportBuilder.HttpApi.Host/Dockerfile.local
    environment:
      - ASPNETCORE_URLS=https://+:8081;http://+:8080;
      - Kestrel__Certificates__Default__Path=/app/certs/localhost.pfx
      - Kestrel__Certificates__Default__Password=2272ee95-295e-409c-adf8-b2d5842ac7e7
      - App__SelfUrl=https://localhost:44364
      - App__AngularUrl=http://localhost:4200
      - App_CorsOrigins=http://localhost:4200
      - App__HealthCheckUrl=http://reportbuilder-api:8080/health-status
      - AuthServer__RequireHttpsMetadata=false
      - AuthServer__Authority=https://localhost:44356
      - App__RedirectAllowedUrls=http://localhost:4200
      - ConnectionStrings__Default=User ID=postgres;Password=myPassw0rd;Host=postgres;Port=5432;Database=ReportBuilder;Pooling=false;
    ports:
      - "44356:8081"
    depends_on:
      postgres:
        condition: service_healthy
    restart: on-failure    
    volumes:
      - ./certs:/app/certs
    networks:
      - abp-network
  

  db-migrator:
    image: reportbuilder-db-migrator:latest
    container_name: db-migrator
    build:
      context: ../../
      dockerfile: src/ReportBuilder.DbMigrator/Dockerfile.local
    environment:
      - OpenIddict__Applications__ReportBuilder_App__RootUrl=http://localhost:4200
      - OpenIddict__Applications__ReportBuilder_Swagger__RootUrl=https://localhost:44356
      - ConnectionStrings__Default=User ID=postgres;Password=myPassw0rd;Host=postgres;Port=5432;Database=ReportBuilder;Pooling=false;
    restart: on-failure
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - abp-network    
  
  postgres:
    container_name: postgres-db
    image: postgres:14.1
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: "postgres"
      POSTGRES_PASSWORD: "myPassw0rd"
    volumes:
      - postgres_data:/var/opt/postgres
    networks: 
      - abp-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5    
volumes:
  postgres_data:
    name: reportbuilder_postgres_data
networks:
  abp-network:
    name: reportbuilder-network
    driver: bridge
