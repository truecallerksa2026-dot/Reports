services:

  # ── Nginx reverse proxy ──────────────────────────────────────────────────────
  nginx-proxy:
    image: nginx:alpine
    container_name: dev-reports-proxy
    ports:
      - "80:80"
    volumes:
      - ./etc/dev-reports/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - reportbuilder-api
      - reportbuilder-angular
    networks:
      - dev-reports-network
    restart: on-failure

  # ── Angular SPA ──────────────────────────────────────────────────────────────
  reportbuilder-angular:
    image: reportbuilder-angular:dev-reports
    container_name: dev-reports-angular
    build:
      context: angular
      dockerfile: Dockerfile        # full multi-stage: node build → nginx serve
    volumes:
      - ./etc/dev-reports/dynamic-env.json:/usr/share/nginx/html/dynamic-env.json:ro
    networks:
      - dev-reports-network
    restart: on-failure

  # ── .NET API ─────────────────────────────────────────────────────────────────
  reportbuilder-api:
    image: reportbuilder-api:dev-reports
    container_name: dev-reports-api
    build:
      context: .
      dockerfile: Dockerfile.api    # multi-stage: dotnet build from source
    environment:
      ASPNETCORE_URLS: "http://+:80"
      ASPNETCORE_ENVIRONMENT: "Production"
      App__SelfUrl: "http://dev-reports.local"
      App__AngularUrl: "http://dev-reports.local"
      App__CorsOrigins: "http://dev-reports.local"
      App__RedirectAllowedUrls: "http://dev-reports.local"
      App__HealthCheckUrl: "http://dev-reports-api:80/health-status"
      AuthServer__Authority: "http://dev-reports.local"
      AuthServer__RequireHttpsMetadata: "false"
      ConnectionStrings__Default: "Host=postgres;Port=5432;Database=ReportBuilder;User ID=rw_user;Password=rw_password_dev;"
      ConnectionStrings__ReadOnly: "Host=postgres;Port=5432;Database=ReportBuilder;User ID=ro_user;Password=ro_password_dev;"
    depends_on:
      db-migrator:
        condition: service_completed_successfully
    networks:
      - dev-reports-network
    restart: on-failure

  # ── DB Migrator (runs once, seeds data) ──────────────────────────────────────
  db-migrator:
    image: reportbuilder-migrator:dev-reports
    container_name: dev-reports-migrator
    build:
      context: .
      dockerfile: Dockerfile.migrator  # multi-stage: dotnet build from source
    environment:
      OpenIddict__Applications__ReportBuilder_App__RootUrl: "http://dev-reports.local"
      OpenIddict__Applications__ReportBuilder_Swagger__RootUrl: "http://dev-reports.local"
      ConnectionStrings__Default: "Host=postgres;Port=5432;Database=ReportBuilder;User ID=rw_user;Password=rw_password_dev;"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - dev-reports-network
    restart: on-failure

  # ── PostgreSQL ────────────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: dev-reports-postgres
    environment:
      POSTGRES_DB: ReportBuilder
      POSTGRES_USER: rw_user
      POSTGRES_PASSWORD: rw_password_dev
    ports:
      - "5433:5432"       # host 5433 so it doesn't clash with local dev DB on 5432
    volumes:
      - dev_reports_postgres_data:/var/lib/postgresql/data
      - ./docker/postgres-init:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U rw_user -d ReportBuilder"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - dev-reports-network

networks:
  dev-reports-network:
    name: dev-reports-network
    driver: bridge

volumes:
  dev_reports_postgres_data:
    name: dev_reports_postgres_data
