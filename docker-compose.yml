version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    container_name: reportbuilder-postgres
    environment:
      POSTGRES_DB: ReportBuilder
      POSTGRES_USER: rw_user
      POSTGRES_PASSWORD: rw_password_dev
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/postgres-init:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U rw_user -d ReportBuilder"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
